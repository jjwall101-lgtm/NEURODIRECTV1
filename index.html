<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#061a35" />
  <meta name="description" content="NeuroDirect: a premium teen wellbeing, planner and parent-support app for ages 13–17." />
  <title>NeuroDirect</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-bg" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand-lockup" aria-label="NeuroDirect home">
      <img src="assets/logo.svg" alt="NeuroDirect logo" class="brand-logo" />
      <div>
        <p class="eyebrow">Teen support dashboard</p>
        <h1>NeuroDirect</h1>
      </div>
    </div>
    <div class="top-actions">
      <button class="ghost-btn" id="themeToggle" type="button" aria-label="Toggle light and dark mode">Theme</button>
      <button class="primary-btn small" data-go="checkin" type="button">Check in</button>
    </div>
  </header>

  <nav class="desktop-nav" aria-label="Main sections">
    <button class="nav-link is-active" data-tab="today" type="button">Today</button>
    <button class="nav-link" data-tab="checkin" type="button">Check-in</button>
    <button class="nav-link" data-tab="planner" type="button">Planner</button>
    <button class="nav-link" data-tab="goals" type="button">Goals</button>
    <button class="nav-link" data-tab="calm" type="button">Calm</button>
    <button class="nav-link" data-tab="journal" type="button">Journal</button>
    <button class="nav-link parent-link" data-tab="parent" type="button">Parent</button>
  </nav>

  <main id="app" class="app-shell" tabindex="-1"></main>

  <nav class="mobile-nav" aria-label="Mobile sections">
    <button class="mobile-link is-active" data-tab="today" type="button"><span>Today</span></button>
    <button class="mobile-link" data-tab="checkin" type="button"><span>Check</span></button>
    <button class="mobile-link" data-tab="planner" type="button"><span>Plan</span></button>
    <button class="mobile-link" data-tab="goals" type="button"><span>Goals</span></button>
    <button class="mobile-link" data-tab="calm" type="button"><span>Calm</span></button>
    <button class="mobile-link" data-tab="journal" type="button"><span>Journal</span></button>
    <button class="mobile-link parent-link" data-tab="parent" type="button"><span>Parent</span></button>
  </nav>

  <template id="emptyStateTemplate">
    <div class="empty-state">
      <div class="empty-icon">•</div>
      <p>No items yet.</p>
    </div>
  </template>

  <script src="script.js" defer></script>
</body>
</html>
